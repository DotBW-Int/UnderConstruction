apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-site
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: static-site
  template:
    metadata:
      labels:
        app: static-site
    spec:
      containers:
        - name: static-site
          image: static-site:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: static-site
  namespace: prod
spec:
  selector:
    app: static-site
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP